version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: bikefinder/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      AUTH_JWKS_URL: http://auth-service:8084/.well-known/jwks.json
      AUTH_JWT_ISSUER: auth-service
      AUTH_JWT_AUDIENCE: bike-ecosystem
      TZ: America/Argentina/Buenos_Aires
      GATEWAY_PUBLIC_PATHS: /auth/**,/oauth2/**,/.well-known/**,/api/v1/catalog/**,/api/v1/locations/**,/api/v1/countries/**,/api/v1/level1/**,/api/v1/level2/**,/api/v1/localities/**,/api/v1/stolen-bikes/*/public,/api/v1/stolen-bikes/*/pdf,/api/v1/theft-reports/*/pdf,/api/v1/tips/**,/api/v1/photos/*/view,/api/v1/photos/*/download,/actuator/health
    networks:
      - bike-network
    restart: unless-stopped

networks:
  bike-network:
    external: true