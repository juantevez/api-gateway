server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        # Auth Service
        - id: auth-service
          uri: http://auth-service:8084
          predicates:
            - Path=/auth/**, /oauth2/**, /.well-known/**

        # Media Service - MÁS ESPECÍFICO, VA PRIMERO
        - id: media-service-photos
          uri: http://media-service-app:8081
          predicates:
            - Path=/api/v1/bicycles/{bicycleId}/photos, /api/v1/bicycles/{bicycleId}/photos/**, /api/v1/photos/**

        # Theft Report
        - id: theft-report
          uri: http://theft-report-app:8083
          predicates:
            - Path=/api/v1/theft-reports/**, /api/v1/stolen-bikes/**, /api/v1/tips/**,/api/v1/bicycles/*/report-theft

        # Bike Registration - MÁS GENERAL, VA DESPUÉS
        - id: bike-registration
          uri: http://bike-registration-app:8080
          predicates:
            - Path=/api/v1/bicycles/**, /api/v1/catalog/**

        # Location Service
        - id: location-service
          uri: http://location-service-app:8082
          predicates:
            - Path=/api/v1/locations/**, /api/v1/countries/**, /api/v1/level1/**, /api/v1/level2/**, /api/v1/localities/**

# JWT Configuration
auth:
  jwks:
    url: http://auth-service:8084/.well-known/jwks.json
  jwt:
    issuer: auth-service
    audience: bike-ecosystem

# Rutas publicas (no requieren JWT)
gateway:
  public-paths: ${GATEWAY_PUBLIC_PATHS:/auth/**,/oauth2/**,/.well-known/**}

  # public-paths:
  #   - /auth/**
  #   - /oauth2/**
  #   - /.well-known/**
  #   - /api/v1/catalog/**
  #   - /api/v1/locations/**
