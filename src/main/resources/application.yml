  #   - /api/v1/tips/**
  #   - /api/v1/photos/*/view
  #   - /api/v1/photos/*/download
  #   - /actuator/health


# Logging
logging:
  level:
    root: INFO
    com.bikefinder.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
