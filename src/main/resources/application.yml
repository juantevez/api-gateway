server:
  port: 8000
spring:
  data:
    redis:
      host: redis
      port: 6379
      password: ""
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://auth-service:8084
          predicates:
            - Path=/auth/**, /oauth2/**, /.well-known/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
                deny-empty-key: false
        - id: media-service-photos
          uri: http://media-service-app:8081
          predicates:
            - Path=/api/v1/bicycles/{bicycleId}/photos,/api/v1/bicycles/{bicycleId}/photos/**,/api/v1/photos/**
        - id: theft-report
          uri: http://theft-report-app:8083
          predicates:
            - Path=/api/v1/theft-reports/**,/api/v1/stolen-bikes/**,/api/v1/tips/**,/api/v1/bicycles/*/report-theft,/api/v1/my-theft-reports
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
                deny-empty-key: false
        - id: s3-storage-service
          uri: http://s3-storage-app:8086
          predicates:
            - Path=/api/files/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
                deny-empty-key: false
        - id: bike-registration
          uri: http://bike-registration-app:8080
          predicates:
            - Path=/api/v1/bicycles/**, /api/v1/catalog/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
                deny-empty-key: false
        - id: location-service
          uri: http://location-service-app:8082
          predicates:
            - Path=/api/v1/locations/**, /api/v1/countries/**, /api/v1/level1/**, /api/v1/level2/**, /api/v1/localities/**
          filters:
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
                deny-empty-key: false
auth:
  jwks:
    url: http://auth-service:8084/.well-known/jwks.json
  jwt:
    issuer: auth-service
    audience: bike-ecosystem
gateway:
  public-paths: ${GATEWAY_PUBLIC_PATHS:/auth/**,/oauth2/**,/.well-known/**}
logging:
  level:
    root: INFO
    com.bikefinder.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
